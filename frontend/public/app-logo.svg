<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- خلفية دائرية بتدرج أزرق -->
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#2D9CCA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A5F7A;stop-opacity:1" />
    </radialGradient>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- الدائرة الرئيسية -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- الهلال الذهبي -->
  <path d="M 60 80 Q 50 100 60 120 Q 90 110 90 100 Q 90 90 60 80" fill="none" stroke="#D4AF37" stroke-width="3" stroke-linecap="round"/>
  <path d="M 65 85 Q 60 100 65 115 Q 85 105 85 100 Q 85 95 65 85" fill="none" stroke="#E5C158" stroke-width="1.5" opacity="0.7"/>
  
  <!-- النجمة -->
  <g transform="translate(100, 60)">
    <polygon points="0,-12 2.6,-4 11,-4 4.5,2 7,-8 0,-2 -7,-8 -4.5,2 -11,-4 -2.6,-4" fill="#D4AF37"/>
  </g>
  
  <!-- الكتاب المفتوح -->
  <g transform="translate(100, 105)">
    <!-- غلاف الكتاب -->
    <rect x="-20" y="-10" width="15" height="25" rx="1" fill="#C19A6B" stroke="#D4AF37" stroke-width="0.5"/>
    <rect x="5" y="-10" width="15" height="25" rx="1" fill="#D4AF37" stroke="#C19A6B" stroke-width="0.5"/>
    
    <!-- الصفحات -->
    <line x1="-5" y1="-8" x2="-5" y2="15" stroke="#F5E6D3" stroke-width="1.5"/>
    <line x1="5" y1="-8" x2="5" y2="15" stroke="#E5D5C3" stroke-width="1.5"/>
    <line x1="-3" y1="-6" x2="3" y2="-6" stroke="#D4AF37" stroke-width="0.5" opacity="0.5"/>
    <line x1="-3" y1="-2" x2="3" y2="-2" stroke="#D4AF37" stroke-width="0.5" opacity="0.5"/>
    <line x1="-3" y1="2" x2="3" y2="2" stroke="#D4AF37" stroke-width="0.5" opacity="0.5"/>
    <line x1="-3" y1="6" x2="3" y2="6" stroke="#D4AF37" stroke-width="0.5" opacity="0.5"/>
    <line x1="-3" y1="10" x2="3" y2="10" stroke="#D4AF37" stroke-width="0.5" opacity="0.5"/>
  </g>
  
  <!-- ضفيرة زخرفية في الأسفل -->
  <path d="M 70 145 Q 100 155 130 145" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
</svg>
